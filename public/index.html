<!DOCTYPE html>
<html>

<head>
    <title>Digisender Notification API</title>
</head>

<body>
    <h1>Digisender Notification API</h1>
    <p>Status: Active</p>
    <h3>Endpoints:</h3>
    <ul>
        <li><code>POST /.netlify/functions/send</code> – Send a notification message</li>
        <li><code>GET /.netlify/functions/pending</code> – Get pending messages</li>
        <li><code>POST /.netlify/functions/ack</code> – Acknowledge message delivery</li>
    </ul>
</body>

</html>
